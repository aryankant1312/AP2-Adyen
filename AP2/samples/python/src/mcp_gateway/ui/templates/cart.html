<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Boots — Your basket</title>
<style>
  :root {
    color-scheme: light;
    --boots-navy: #05054B;
    --boots-blue: #004990;
    --boots-red:  #CC0033;
    --boots-yellow: #FFE600;
    --boots-grey-bg: #F4F5F7;
    --boots-border: #E1E3E8;
    --boots-text: #05054B;
    --boots-muted: #6B7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 Arial, Helvetica, sans-serif;
    background: var(--boots-grey-bg);
    color: var(--boots-text);
  }
  .frame {
    background: #fff;
    border: 1px solid var(--boots-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .header {
    background: var(--boots-navy);
    padding: 14px 16px;
  }
  .header img.logo { height: 38px; filter: brightness(0) invert(1); display: block; }
  /* ───── Steps ───── */
  .steps {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--boots-border);
    background: #fff;
  }
  .step {
    font-size: 12px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--boots-muted);
    padding-bottom: 4px;
    border-bottom: 2px solid transparent;
  }
  .step.active { color: var(--boots-blue); border-bottom-color: var(--boots-blue); }
  .step.done { color: var(--boots-text); }
  .sep { color: var(--boots-muted); }
  .body { padding: 16px; }
  .basket-card {
    background: var(--boots-grey-bg);
    border: 1px solid var(--boots-border);
    border-radius: 8px;
    padding: 14px;
  }
  .basket-card h2 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--boots-muted);
  }
  .item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px;
    border: 1px solid var(--boots-border);
    background: #fff;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .item .left {
    display: flex; flex-direction: column; gap: 4px;
  }
  .item .name { font-weight: 700; color: var(--boots-text); font-size: 14px; }
  .item .ref  { color: var(--boots-muted); font-size: 12px; }
  .item .tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: #E8F5EE; color: #1E7C3A;
    border-radius: 3px; padding: 2px 6px;
    font-weight: 600; font-size: 11px;
    width: fit-content;
  }
  .item .price {
    font-weight: 700; color: var(--boots-text); font-size: 15px;
    text-align: right;
  }
  .item .qty { color: var(--boots-muted); font-size: 12px; }
  .totals {
    background: #fff;
    border: 1px solid var(--boots-border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-top: 14px;
  }
  .totrow {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; font-size: 13px; color: var(--boots-muted);
  }
  .totrow.big {
    font-size: 16px; font-weight: 700; color: var(--boots-text);
    border-top: 1px solid var(--boots-border); padding-top: 10px; margin-top: 6px;
  }
  .ready-banner {
    margin-top: 14px;
    background: var(--boots-yellow);
    border: 1px solid #efd900;
    color: var(--boots-navy);
    text-align: center;
    font-weight: 700;
    padding: 11px;
    border-radius: 6px;
    font-size: 13px;
  }
  button.cta {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: var(--boots-red);
    color: #fff;
    border: 0;
    border-radius: 5px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .04em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button.cta:disabled { opacity: .5; cursor: not-allowed; }
  .ghost {
    width: 100%;
    margin-top: 8px;
    padding: 11px;
    background: transparent;
    color: var(--boots-blue);
    border: 1.5px solid var(--boots-blue);
    border-radius: 5px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .timer { color: var(--boots-muted); font-size: 12px; margin-top: 8px; text-align: center; }
  .empty { padding: 32px; text-align: center; color: var(--boots-muted); }
</style>
</head>
<body>
<div class="frame">
  <div class="header"><img class="logo" id="logo" alt="Boots"></div>
  <div class="steps">
    <span class="step active" id="step-cart">Basket</span>
    <span class="sep">—</span>
    <span class="step" id="step-pay">Payment</span>
    <span class="sep">—</span>
    <span class="step" id="step-receipt">Receipt</span>
  </div>
  <div class="body" id="root"></div>
</div>

<script>
var _has_data = false;

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function send(prompt) {
  if (window.openai && window.openai.sendFollowUpMessage) {
    window.openai.sendFollowUpMessage({ prompt: prompt });
  }
}

function render(out) {
  if (_has_data && (!out || !Object.keys(out).length)) return;
  if (out && Object.keys(out).length) _has_data = true;

  document.getElementById("logo").src = "{{BOOTS_LOGO_DATA_URL}}";

  const lines  = Array.isArray(out.items) ? out.items : [];
  const cartId = out.cart_id || "(no cart)";

  const root = document.getElementById("root");
  if (!root) return;

  if (!lines.length) {
    root.innerHTML = `<div class="empty">Your basket is empty. Add products from the catalog to get started.</div>`;
    return;
  }

  const itemsHtml = lines.map(it => {
    const lineTotal = (Number(it.qty) || 0) * (Number(it.unit_price_gbp) || 0);
    return `
      <div class="item">
        <div class="left">
          <div class="name">💊 ${escapeHtml(it.title || it.product_ref)}</div>
          <div class="ref">${escapeHtml(it.product_ref)}</div>
          <span class="tag">✓ Selected</span>
        </div>
        <div>
          <div class="price">£${lineTotal.toFixed(2)}</div>
          <div class="qty">qty ${it.qty}</div>
        </div>
      </div>`;
  }).join("");

  const sub  = Number(out.subtotal_gbp || 0).toFixed(2);
  const ship = Number(out.shipping_gbp || 0).toFixed(2);
  const tax  = Number(out.tax_gbp || 0).toFixed(2);
  const tot  = Number(out.total_gbp || 0).toFixed(2);

  const timerLine = out.expires_at ? `<div class="timer" id="timer"></div>` : "";

  root.innerHTML = `
    <div class="basket-card">
      <h2>🛒 My basket</h2>
      ${itemsHtml}
      <div class="totals">
        <div class="totrow"><span>Subtotal</span><span>£${sub}</span></div>
        <div class="totrow"><span>Delivery</span><span>£${ship}</span></div>
        <div class="totrow"><span>VAT (UK OTC: 0%)</span><span>£${tax}</span></div>
        <div class="totrow big"><span>Total</span><span>£${tot}</span></div>
      </div>
      <div class="ready-banner">✅ Basket is ready for checkout!</div>
      <button class="cta" id="pay">💳 Proceed to payment</button>
      <button class="ghost" id="more">+ Add more items</button>
      ${timerLine}
    </div>`;

  document.getElementById("pay").onclick = () =>
    send(`Show me my saved Boots cards to pay for basket ${cartId}.`);
  document.getElementById("more").onclick = () =>
    send(`What else might I want to add to basket ${cartId}?`);

  if (out.expires_at) {
    const expEl = document.getElementById("timer");
    const exp = new Date(out.expires_at).getTime();
    const tick = () => {
      const ms = exp - Date.now();
      if (ms <= 0) { expEl.textContent = "Basket has expired."; return; }
      const m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000);
      expEl.textContent = `Reserved for ${m}m ${s.toString().padStart(2,"0")}s`;
    };
    tick(); setInterval(tick, 1000);
  }
}

function boot() {
  var out = (window.openai && window.openai.toolOutput) || {};
  render(out);
}

boot();
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
window.addEventListener("load", function() {
  boot();
  var _polls = 0;
  var _timer = setInterval(function() {
    _polls++;
    boot();
    if (_has_data || _polls >= 20) clearInterval(_timer);
  }, 150);
});
</script>
</body>
</html>
