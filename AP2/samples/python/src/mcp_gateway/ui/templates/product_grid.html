<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pharmacy products</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg, #f7f7f8);
    color: var(--fg, #1a1a1a);
  }
  @media (prefers-color-scheme: dark) {
    body { --bg: #1c1c1e; --fg: #f1f1f3; }
    .card { background: #2a2a2d; border-color: #3a3a3d; }
    .badge-stock { background: #1f3b27; color: #6fe096; }
    .badge-out   { background: #3b1f1f; color: #f08c8c; }
    .price       { color: #fff; }
    button.add   { background: #5b8def; color: #fff; }
  }
  .wrap { padding: 16px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: #777; font-size: 13px; margin-bottom: 14px; }
  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .card {
    background: #fff;
    border: 1px solid #e7e7ea;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .swatch {
    height: 64px;
    border-radius: 8px;
    background: linear-gradient(135deg, #eaf2ff 0%, #dde9ff 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .title { font-weight: 600; line-height: 1.3; }
  .brand { color: #888; font-size: 12px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .price { font-size: 16px; font-weight: 600; color: #111; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  .badge-stock { background: #e6f7ec; color: #1e7c3a; }
  .badge-out   { background: #fbe8e8; color: #a32020; }
  .shelf { color: #666; font-size: 12px; }
  button.add {
    margin-top: 4px;
    padding: 8px 10px;
    font-weight: 600;
    font-size: 13px;
    border-radius: 8px;
    border: 0;
    background: #1f6feb;
    color: white;
    cursor: pointer;
  }
  button.add[disabled] { opacity: 0.5; cursor: not-allowed; }
  .empty {
    padding: 32px;
    text-align: center;
    color: #888;
    border: 1px dashed #ccc;
    border-radius: 10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="hd">Products</h1>
  <div class="sub" id="sub"></div>
  <div id="root" class="grid"></div>
</div>
<script>
var _has_data = false;

function render(out) {
  // Only guard against clearing a render that already has product data.
  if (_has_data && (!out || !Object.keys(out).length)) return;
  if (out && Object.keys(out).length) _has_data = true;

  const products = Array.isArray(out.products) ? out.products
                 : (Array.isArray(out) ? out : []);
  const store = out.store || out.store_location || null;

  const CATEGORY_ICON = {
    "Pain Relief": "💊", "Cold & Flu": "🤧", "Allergy & Sinus": "🌿",
    "Digestive Health": "🫀", "First Aid": "🩹", "Vitamins & Supplements": "💪",
    "Skin Care": "🧴", "Children's Health": "🍼", "Smoking Cessation": "🚭",
    "Sleep Aid": "😴", "Eye Care": "👁"
  };

  document.getElementById("hd").textContent =
    products.length ? `${products.length} product${products.length === 1 ? "" : "s"} found`
                    : "No products";
  document.getElementById("sub").textContent =
    store ? `at ${store}` : "across all stores";

  const root = document.getElementById("root");
  if (!root) return;

  if (!products.length) {
    root.innerHTML = `<div class="empty">No matching products. Try a different keyword.</div>`;
    return;
  }

  function send(msg) {
    if (window.openai && window.openai.sendFollowUpMessage) {
      window.openai.sendFollowUpMessage({ prompt: msg });
    }
  }

  root.innerHTML = "";
  for (const p of products) {
    const inStock = p.in_stock !== false && (p.qty_in_stock == null || p.qty_in_stock > 0);
    const icon = CATEGORY_ICON[p.category] || "🧪";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="swatch">${icon}</div>
      <div class="title">${escapeHtml(p.title || p.product_ref)}</div>
      <div class="brand">${escapeHtml(p.brand || "")}${p.category ? " · " + escapeHtml(p.category) : ""}</div>
      <div class="row">
        <div class="price">£${(Number(p.price_gbp) || 0).toFixed(2)}</div>
        <div class="badge ${inStock ? "badge-stock" : "badge-out"}">
          ${inStock ? (p.qty_in_stock ? p.qty_in_stock + " in stock" : "In stock") : "Out of stock"}
        </div>
      </div>
      ${p.shelf ? `<div class="shelf">${escapeHtml(p.shelf)}</div>` : ""}
    `;
    const btn = document.createElement("button");
    btn.className = "add";
    btn.textContent = inStock ? "Add to cart" : "Notify when in stock";
    btn.disabled = !inStock;
    btn.onclick = () => send(
      inStock
        ? `Add 1 × ${p.title || p.product_ref} (${p.product_ref}) to my cart.`
        : `Let me know when ${p.title || p.product_ref} is back in stock.`
    );
    card.appendChild(btn);
    root.appendChild(card);
  }
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function boot() {
  var out = (window.openai && window.openai.toolOutput) || {};
  render(out);
}

boot();
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
// Poll every 150ms for up to 3s — ChatGPT injects toolOutput after the
// invoking→invoked transition, which arrives after the initial boot attempts.
window.addEventListener("load", function() {
  boot();
  var _polls = 0;
  var _timer = setInterval(function() {
    _polls++;
    boot();
    if (_has_data || _polls >= 20) clearInterval(_timer);
  }, 150);
});
</script>
</body>
</html>
