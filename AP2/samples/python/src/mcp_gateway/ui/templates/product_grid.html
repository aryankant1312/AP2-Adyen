<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Boots — Pharmacy results</title>
<style>
  :root {
    color-scheme: light;
    --boots-navy: #05054B;
    --boots-blue: #004990;
    --boots-red:  #CC0033;
    --boots-yellow: #FFE600;
    --boots-grey-bg: #F4F5F7;
    --boots-border: #E1E3E8;
    --boots-text: #05054B;
    --boots-muted: #6B7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 Arial, Helvetica, sans-serif;
    background: var(--boots-grey-bg);
    color: var(--boots-text);
  }
  .frame {
    background: #fff;
    border: 1px solid var(--boots-border);
    border-radius: 8px;
    overflow: hidden;
  }
  /* ───── Boots header ───── */
  .header {
    background: var(--boots-navy);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .header img.logo { height: 38px; width: auto; display: block; filter: brightness(0) invert(1); }
  .header .search {
    flex: 1;
    background: #fff;
    border-radius: 6px;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    color: var(--boots-muted);
    font-size: 13px;
    border: 1px solid transparent;
  }
  .header .search .icon { width: 14px; height: 14px; opacity: .7; }
  /* ───── Yellow info banner ───── */
  .banner {
    background: var(--boots-yellow);
    color: var(--boots-navy);
    font-weight: 600;
    font-size: 13px;
    padding: 9px 16px;
    text-align: center;
    border-top: 1px solid #efd900;
    border-bottom: 1px solid #efd900;
  }
  /* ───── Body ───── */
  .body { padding: 4px 0; }
  .empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--boots-muted);
  }
  /* ───── Product row ───── */
  .row {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--boots-border);
  }
  .row:last-child { border-bottom: 0; }
  .swatch {
    width: 60px; height: 60px;
    border-radius: 8px;
    background: #F8FAFD;
    border: 1px solid var(--boots-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .info .title {
    font-weight: 700; color: var(--boots-text);
    font-size: 14px; line-height: 1.3;
  }
  .info .meta { font-size: 12px; color: var(--boots-muted); margin-top: 2px; }
  .info .price-row {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
    flex-wrap: wrap;
  }
  .price { font-weight: 700; color: var(--boots-text); font-size: 15px; }
  .price-old { color: var(--boots-muted); text-decoration: line-through; font-size: 12px; }
  .discount { color: #2E7D32; font-weight: 600; font-size: 12px; }
  .rating {
    margin-top: 6px; display: inline-flex; align-items: center; gap: 3px;
    background: #2E7D32; color: #fff;
    font-weight: 700; font-size: 11px;
    padding: 2px 6px; border-radius: 3px;
  }
  .out-tag {
    display: inline-block; margin-top: 4px;
    background: #FBE8E8; color: var(--boots-red);
    font-weight: 600; font-size: 11px;
    padding: 2px 6px; border-radius: 3px;
  }
  /* ───── ADD / ADDED button ───── */
  button.add {
    min-width: 86px;
    padding: 9px 14px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    border-radius: 5px;
    border: 1.5px solid var(--boots-blue);
    background: #fff;
    color: var(--boots-blue);
    cursor: pointer;
    transition: all .12s;
  }
  button.add:hover:not(:disabled) { background: #EAF1F7; }
  button.add.added {
    background: #1E7C3A; color: #fff; border-color: #1E7C3A;
  }
  button.add:disabled { opacity: .5; cursor: not-allowed; border-color: #C9CDD4; color: #6B7280; }
  /* ───── Footer (selected count + actions) ───── */
  .footer {
    background: #fff;
    border-top: 1px solid var(--boots-border);
    padding: 14px 16px;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 10px;
  }
  button.secondary, button.cta {
    padding: 12px 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .04em;
    text-transform: uppercase;
    border-radius: 5px;
    cursor: pointer;
    border: 0;
  }
  button.secondary {
    background: #fff;
    border: 1.5px solid var(--boots-blue);
    color: var(--boots-blue);
  }
  button.cta {
    background: var(--boots-red);
    color: #fff;
  }
  button.cta:disabled, button.secondary:disabled { opacity: .55; cursor: not-allowed; }
  .count {
    text-align: center;
    font-size: 12px;
    color: var(--boots-muted);
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="header">
    <img class="logo" id="logo" alt="Boots">
    <div class="search">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span id="search-text">Pharmacy results</span>
    </div>
  </div>
  <div class="banner" id="banner">Showing pharmacy results — select items to add to your basket</div>
  <div class="body" id="root"></div>
  <div class="footer" id="footer" style="display:none">
    <div class="actions">
      <button class="secondary" id="more">More options</button>
      <button class="cta" id="checkout" disabled>Checkout</button>
    </div>
    <div class="count" id="count">0 item(s) selected</div>
  </div>
</div>

<script>
var _has_data = false;
var _selected = {};   // product_ref -> { product_ref, title, qty }

function logoSrc() { return "{{BOOTS_LOGO_DATA_URL}}"; }

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function send(prompt) {
  if (window.openai && window.openai.sendFollowUpMessage) {
    window.openai.sendFollowUpMessage({ prompt: prompt });
  }
}

function categoryIcon(cat) {
  const ICONS = {
    "Pain Relief": "💊", "Cold & Flu": "🤧", "Allergy & Sinus": "🌿",
    "Digestive Health": "🫀", "First Aid": "🩹", "Vitamins & Supplements": "💪",
    "Skin Care": "🧴", "Children's Health": "🍼", "Smoking Cessation": "🚭",
    "Sleep Aid": "😴", "Eye Care": "👁"
  };
  return ICONS[cat] || "💊";
}

function refreshFooter() {
  const count = Object.keys(_selected).length;
  document.getElementById("count").textContent =
    `${count} item${count === 1 ? "" : "s"} selected`;
  document.getElementById("checkout").disabled = count === 0;
}

function render(out) {
  if (_has_data && (!out || !Object.keys(out).length)) return;
  if (out && Object.keys(out).length) _has_data = true;

  const products = Array.isArray(out.products) ? out.products
                 : (Array.isArray(out) ? out : []);
  const store = out.store || out.store_location || null;
  const query = out.query || null;

  document.getElementById("logo").src = logoSrc();
  document.getElementById("search-text").textContent =
    query ? `Results for "${query}"` : "Pharmacy results";
  document.getElementById("banner").textContent = store
    ? `Showing pharmacy results at ${store} — select items to add to your basket`
    : "Showing pharmacy results — select items to add to your basket";

  const root = document.getElementById("root");
  const footer = document.getElementById("footer");
  if (!root) return;

  if (!products.length) {
    root.innerHTML = `<div class="empty">No matching products. Try a different search.</div>`;
    footer.style.display = "none";
    return;
  }

  root.innerHTML = "";
  for (const p of products) {
    const inStock = p.in_stock !== false && (p.qty_in_stock == null || p.qty_in_stock > 0);
    const price = Number(p.price_gbp) || 0;
    const oldPrice = price > 0 ? (price * 1.12) : 0;  // synthetic "was" price
    const pctOff = oldPrice > 0 ? Math.round(((oldPrice - price) / oldPrice) * 100) : 0;
    const isSelected = !!_selected[p.product_ref];

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="swatch">${categoryIcon(p.category)}</div>
      <div class="info">
        <div class="title">${escapeHtml(p.title || p.product_ref)}</div>
        <div class="meta">${escapeHtml(p.brand || "")}${p.category ? " · " + escapeHtml(p.category) : ""}</div>
        <div class="price-row">
          <span class="price">£${price.toFixed(2)}</span>
          ${oldPrice ? `<span class="price-old">£${oldPrice.toFixed(2)}</span>` : ""}
          ${pctOff > 0 ? `<span class="discount">${pctOff}% off</span>` : ""}
        </div>
        ${inStock
          ? `<div class="rating">★ ${(4 + Math.random()*0.9).toFixed(1)}</div>`
          : `<div class="out-tag">Out of stock</div>`}
      </div>
      <div></div>
    `;
    const btn = document.createElement("button");
    btn.className = "add" + (isSelected ? " added" : "");
    btn.textContent = isSelected ? "✓ Added" : "Add";
    btn.disabled = !inStock;
    btn.onclick = () => {
      if (_selected[p.product_ref]) {
        delete _selected[p.product_ref];
        btn.classList.remove("added");
        btn.textContent = "Add";
      } else {
        _selected[p.product_ref] = {
          product_ref: p.product_ref,
          title: p.title,
          qty: 1
        };
        btn.classList.add("added");
        btn.textContent = "✓ Added";
      }
      refreshFooter();
    };
    row.querySelector(".info").parentNode.replaceChild(btn, row.children[2]);
    root.appendChild(row);
  }

  footer.style.display = "block";
  refreshFooter();

  document.getElementById("more").onclick = () =>
    send("Show me more pharmacy products I might want to consider.");
  document.getElementById("checkout").onclick = () => {
    const items = Object.values(_selected);
    if (!items.length) return;
    const list = items
      .map(it => `  - ${it.title || it.product_ref} (${it.product_ref}) × ${it.qty}`)
      .join("\n");
    send(
      `Please add the following items to my Boots basket and then take me to ` +
      `checkout (call add_cart_item for each, then finalize_cart, then ` +
      `get_merchant_on_file_payment_methods):\n${list}`
    );
  };
}

function boot() {
  var out = (window.openai && window.openai.toolOutput) || {};
  render(out);
}

boot();
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
window.addEventListener("load", function() {
  boot();
  var _polls = 0;
  var _timer = setInterval(function() {
    _polls++;
    boot();
    if (_has_data || _polls >= 20) clearInterval(_timer);
  }, 150);
});
</script>
</body>
</html>
